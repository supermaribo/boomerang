services:
  boomerang:
    build: .
    image: boomerang:latest
    container_name: boomerang
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - boomerang-data:/var/lib/boomerang
    environment:
      BOOMERANG_LISTEN: "0.0.0.0:8080"
      BOOMERANG_DATA_DIR: "/var/lib/boomerang"
      # Optional: pin master key for restores (64 hex chars = 32 bytes)
      # BOOMERANG_MASTER_KEY: ""

volumes:
  boomerang-data:
