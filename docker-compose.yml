services:
  boomerang:
    build:
      context: .
      args:
        VERSION: ${BOOMERANG_VERSION:-dev}
    image: boomerang:${BOOMERANG_VERSION:-dev}
    container_name: boomerang
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - boomerang-data:/var/lib/boomerang
    environment:
      BOOMERANG_LISTEN: "0.0.0.0:8080"
      BOOMERANG_DATA_DIR: "/var/lib/boomerang"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Optional: pin master key for restores (64 hex chars = 32 bytes)
      # BOOMERANG_MASTER_KEY: ""

volumes:
  boomerang-data:
