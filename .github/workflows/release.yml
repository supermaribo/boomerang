name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "semver=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            supermaribo/boomerang:latest
            supermaribo/boomerang:${{ steps.meta.outputs.semver }}
            supermaribo/boomerang:${{ github.ref_name }}

  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build web UI
        run: |
          cd web
          npm ci
          npm run build

      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          LDFLAGS="-s -w -X github.com/boomerang-backup/boomerang/internal/version.Version=${VERSION}"
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="$LDFLAGS" -o boomerang-linux-amd64 ./cmd/boomerang
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags="$LDFLAGS" -o boomerang-linux-arm64 ./cmd/boomerang
          sha256sum boomerang-linux-amd64 boomerang-linux-arm64 > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            boomerang-linux-amd64
            boomerang-linux-arm64
            SHA256SUMS
          generate_release_notes: true
